<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ToDo">
    
    <style>
        :root { 
            --primary: #007aff; --bg: #ffffff; --surface: #f5f5f7;
            --text-main: #1d1d1f; --text-sub: #86868b; --danger: #ff3b30;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* [CTO 해결책] 하단 바 붕 뜸 방지: 화면 전체 높이를 강제 고정 */
        body, html { 
            margin: 0; padding: 0; height: 100vh; height: -webkit-fill-available;
            overflow: hidden; background: var(--bg); font-family: -apple-system, sans-serif;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; position: relative; }

        /* GNB 영역 */
        .gnb { padding-top: var(--safe-top); background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); z-index: 100; }
        .gnb-content { padding: 32px 24px 12px; }
        .gnb-title { font-size: 34px; font-weight: 700; color: var(--text-main); letter-spacing: -0.03em; margin-bottom: 6px; }
        .date-text { font-size: 17px; font-weight: 600; color: var(--text-sub); margin-bottom: 10px; }

        /* 콘텐츠 영역: 하단 바 두께만큼 padding 확보 */
        .content { 
            flex: 1; padding: 0 24px; overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding-bottom: calc(var(--safe-bottom) + 100px); 
        }

        .input-group { display: flex; background: var(--surface); padding: 8px 8px 8px 18px; border-radius: 16px; margin: 16px 0 32px; }
        input[type="text"] { flex: 1; border: none; background: none; height: 44px; font-size: 17px; outline: none; }
        .add-btn { width: 44px; height: 44px; background: var(--text-main); color: white; border: none; border-radius: 12px; font-size: 22px; }

        /* [CTO 해결책] 테두리 깨짐 방지: overflow: hidden과 shadow 최적화 */
        .item-wrapper { position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 12px; background-color: var(--danger); }
        .list-item { 
            position: relative; z-index: 2; background: var(--bg); padding: 20px; 
            display: flex; align-items: center; border-radius: 20px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.02); 
            transition: transform 0.2s ease-out;
        }
        
        .checkbox { width: 24px; height: 24px; border: 1.5px solid #d2d2d7; border-radius: 7px; margin-right: 16px; flex-shrink: 0; }
        .item-text { font-size: 17px; font-weight: 400; color: var(--text-main); flex: 1; }
        .quick-delete { color: #d2d2d7; font-size: 18px; padding-left: 10px; }

        /* [CTO 해결책] 하단 네비게이션: 화면 최하단에 절대 고정 */
        .nav-bar { 
            position: absolute; bottom: 0; left: 0; right: 0;
            padding-bottom: var(--safe-bottom); height: calc(var(--safe-bottom) + 64px); 
            display: flex; background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: saturate(180%) blur(20px); border-top: 0.5px solid rgba(0,0,0,0.08); 
            z-index: 200;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #a1a1a6; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="gnb">
            <div class="gnb-content">
                <div class="gnb-title">ToDo</div>
                <div class="date-text" id="displayDate"></div>
            </div>
        </header>
        
        <main class="content">
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="새로운 할 일">
                <button class="add-btn" onclick="addTodo()">+</button>
            </div>
            <ul id="activeList"></ul>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active">
                <span class="nav-icon">◯</span><span>진행중</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">●</span><span>완료됨</span>
            </div>
        </nav>
    </div>

    <script>
        // 데이터 저장 및 날짜 자동화 로직
        const dateEl = document.getElementById('displayDate');
        const now = new Date();
        dateEl.innerText = `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}.`;

        let db = JSON.parse(localStorage.getItem('vibe_todo_final')) || [];

        function render() {
            const list = document.getElementById('activeList');
            list.innerHTML = db.length === 0 ? `<div style="text-align:center; padding-top:60px; color:#c7c7cc;">할 일이 없습니다.</div>` : "";
            db.forEach((item, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'item-wrapper';
                wrapper.innerHTML = `
                    <div style="position:absolute; right:0; top:0; bottom:0; width:80px; display:flex; align-items:center; justify-content:center; color:white; font-weight:600; font-size:14px;">삭제</div>
                    <div class="list-item" ontouchstart="handleStart(event)" ontouchmove="handleMove(event)" ontouchend="handleEnd(event)">
                        <div class="checkbox"></div>
                        <span class="item-text">${item}</span>
                        <div class="quick-delete" onclick="remove(${index})">✕</div>
                    </div>
                `;
                list.appendChild(wrapper);
            });
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value.trim()) return;
            db.push(input.value);
            localStorage.setItem('vibe_todo_final', JSON.stringify(db));
            input.value = '';
            render();
        }

        function remove(index) {
            db.splice(index, 1);
            localStorage.setItem('vibe_todo_final', JSON.stringify(db));
            render();
        }

        // 스와이프 로직
        let startX = 0;
        function handleStart(e) { startX = e.touches[0].clientX; e.currentTarget.style.transition = 'none'; }
        function handleMove(e) { 
            const move = e.touches[0].clientX - startX;
            if (move < 0 && move > -100) e.currentTarget.style.transform = `translateX(${move}px)`;
        }
        function handleEnd(e) {
            const el = e.currentTarget;
            el.style.transition = 'transform 0.2s ease-out';
            const move = e.changedTouches[0].clientX - startX;
            if (move < -50) el.style.transform = 'translateX(-80px)';
            else el.style.transform = 'translateX(0)';
        }

        render();
    </script>
</body>
</html>
