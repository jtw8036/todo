<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- 1. iOS 전용: 사파리 UI 강제 제거 및 상태바 투명화 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vibe Todo">
    
    <!-- 2. 웹 매니페스트: 앱처럼 실행되도록 선언 (파일 별도 생성 대신 인라인 처리) -->
    <link rel="manifest" href="data:application/json,{'display':'standalone','start_url':'/','name':'Vibe Todo'}">
    
    <!-- 3. 앱 아이콘 설정 -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4697/4697260.png">

    <title>Vibe Todo</title>
    <style>
        /* 4. 디바이스 상단 노치/하단 바 영역 침범 방지 (Padding) */
        :root { 
            --primary: #007aff; --bg: #ffffff; --surface: #f2f2f7; 
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* 헤더가 상태바(노치) 밑으로 내려오게 조정 */
        .header { 
            padding-top: calc(var(--safe-top) + 20px); 
            padding-left: 24px; padding-right: 24px; padding-bottom: 15px;
            background: var(--bg); border-bottom: 0.5px solid #e5e5e7; 
        }
        
        .date-picker { font-size: 24px; font-weight: 800; border: none; background: none; color: var(--primary); outline: none; }

        .content { flex: 1; padding: 20px 24px; overflow-y: auto; padding-bottom: calc(var(--safe-bottom) + 100px); }
        
        .input-wrapper { display: flex; align-items: center; background: var(--surface); padding: 8px 8px 8px 20px; border-radius: 18px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; border: none; background: none; height: 44px; font-size: 16px; outline: none; }
        .add-btn { width: 40px; height: 40px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 20px; cursor: pointer; }

        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; align-items: center; padding: 16px; background: var(--surface); border-radius: 16px; margin-bottom: 10px; transition: 0.4s; }
        li.fade-out { opacity: 0; transform: translateX(30px); }

        /* 하단 네비 바: 폰 하단바 영역 고려 */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; 
            padding-bottom: var(--safe-bottom); 
            height: calc(var(--safe-bottom) + 70px);
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
            display: flex; border-top: 0.5px solid #d1d1d6; 
        }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #8e8e93; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <input type="date" id="dateSelect" class="date-picker" onchange="loadData()">
    </div>
    <main class="content">
        <div id="inputSection" class="input-wrapper">
            <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
            <button class="add-btn" onclick="addTodo()">+</button>
        </div>
        <div id="todoTab"><ul id="activeList"></ul></div>
        <div id="doneTab" style="display:none;"><ul id="doneList"></ul></div>
    </main>
    <nav class="nav-bar">
        <div class="nav-item active" onclick="switchTab('todo', this)">할 일</div>
        <div class="nav-item" onclick="switchTab('done', this)">완료함</div>
    </nav>

    <script>
        // 5. [중요] 내부 링크 클릭 시 사파리 브라우저가 열리는 것을 방지하는 스크립트
        (function(document,navigator,standalone) {
            if ((standalone in navigator) && navigator[standalone]) {
                var curnode, location=document.location, stop=/^(a|html)$/i;
                document.addEventListener('click', function(e) {
                    curnode=e.target;
                    while (!(stop).test(curnode.nodeName)) { curnode=curnode.parentNode; }
                    if('href' in curnode && ( curnode.href.indexOf('http') || ~curnode.href.indexOf(location.host) ) ) {
                        e.preventDefault();
                        location.href = curnode.href;
                    }
                },false);
            }
        })(document,window.navigator,'standalone');

        const dInput = document.getElementById('dateSelect');
        dInput.value = new Date().toISOString().substring(0, 10);
        let db = JSON.parse(localStorage.getItem('todo_v2')) || {};

        function loadData() {
            const date = dInput.value;
            document.getElementById('activeList').innerHTML = "";
            document.getElementById('doneList').innerHTML = "";
            if (db[date]) {
                db[date].active.forEach(t => render(t, false));
                db[date].done.forEach(t => render(t, true));
            }
        }

        function render(text, isDone) {
            const li = document.createElement('li');
            li.innerHTML = isDone ? `<span style="color:#8e8e93;text-decoration:line-through">${text}</span>` 
                                  : `<input type="checkbox" onclick="done(this)"> <span style="margin-left:10px">${text}</span>`;
            document.getElementById(isDone ? 'doneList' : 'activeList').appendChild(li);
        }

        function addTodo() {
            const el = document.getElementById('todoInput');
            if (!el.value.trim()) return;
            render(el.value, false);
            save(); el.value = "";
        }

        function done(cb) {
            const li = cb.parentElement;
            const text = li.innerText.trim();
            li.classList.add('fade-out');
            setTimeout(() => {
                li.remove();
                render(text, true);
                save();
            }, 400);
        }

        function save() {
            const date = dInput.value;
            const active = Array.from(document.querySelectorAll('#activeList li')).map(li => li.innerText.trim());
            const done = Array.from(document.querySelectorAll('#doneList li')).map(li => li.innerText.trim());
            db[date] = { active, done };
            localStorage.setItem('todo_v2', JSON.stringify(db));
        }

        function switchTab(type, el) {
            document.getElementById('todoTab').style.display = type === 'todo' ? 'block' : 'none';
            document.getElementById('doneTab').style.display = type === 'done' ? 'block' : 'none';
            document.getElementById('inputSection').style.display = type === 'todo' ? 'flex' : 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        loadData();
    </script>
</body>
</html>
