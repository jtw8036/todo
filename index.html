<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS 전용: 앱으로 실행 시 사파리 UI 제거 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="VibeTodo">
    
    <!-- 신분증 및 아이콘 연결 -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4697/4697260.png">

    <style>
        :root { 
            --primary: #007aff; 
            --bg: #ffffff;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: var(--bg); font-family: -apple-system, sans-serif;
        }

        /* 아이폰 노치 및 하단 바 영역 보호 */
        .app-container {
            display: flex; flex-direction: column; height: 100%;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
        }

        .header { padding: 20px 24px; border-bottom: 0.5px solid #e5e5e7; }
        .title { font-size: 24px; font-weight: 800; color: var(--primary); margin: 0; }

        .content { flex: 1; padding: 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .input-group { display: flex; background: #f2f2f7; padding: 10px 10px 10px 20px; border-radius: 20px; margin-bottom: 20px; }
        input { flex: 1; border: none; background: none; height: 40px; font-size: 16px; outline: none; }
        .add-btn { width: 40px; height: 40px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; }

        .list-item { background: #f2f2f7; padding: 16px; border-radius: 16px; margin-bottom: 12px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header"><h1 class="title">Vibe Todo</h1></header>
        <main class="content">
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="오늘의 바이브를 적으세요">
                <button class="add-btn" onclick="add()">+</button>
            </div>
            <div id="list"></div>
        </main>
    </div>

    <script>
        // 1. 서비스 워커 등록: iOS가 이 사이트를 '앱'으로 인식하게 만드는 엔진
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e){})');
        }

        // 2. 사파리 탈출 방지: 앱 내부의 모든 링크가 사파리로 튕기지 않게 고정
        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");

        function add() {
            const input = document.getElementById('todoInput');
            if(!input.value) return;
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerText = input.value;
            document.getElementById('list').prepend(item);
            input.value = '';
        }
    </script>
</body>
</html>
