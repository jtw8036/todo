<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { 
            --primary: #007aff; --bg: #ffffff; --surface: #f5f5f7;
            --text-main: #1d1d1f; --text-sub: #86868b;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* [CTO 해결] 하단바 붕 뜸 방지: flex 구조로 화면 높이를 정확히 삼등분 */
        html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, sans-serif; }
        
        .app-container { 
            display: flex; flex-direction: column; 
            height: 100vh; height: -webkit-fill-available;
        }

        /* 1. 상단 GNB */
        .gnb { padding-top: var(--safe-top); background: #fff; z-index: 10; }
        .gnb-content { padding: 30px 24px 10px; }
        .gnb-title { font-size: 34px; font-weight: 800; color: var(--text-main); letter-spacing: -1px; }
        .date-text { font-size: 17px; font-weight: 600; color: var(--text-sub); margin-top: 4px; }

        /* 2. 중앙 스크롤 영역 */
        .content { 
            flex: 1; padding: 0 24px; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .input-group { 
            display: flex; background: var(--surface); padding: 8px 8px 8px 18px; 
            border-radius: 16px; margin: 20px 0 30px; 
        }
        input { flex: 1; border: none; background: none; height: 44px; font-size: 17px; outline: none; }
        .add-btn { width: 44px; height: 44px; background: var(--text-main); color: white; border: none; border-radius: 12px; font-size: 20px; }

        /* 리스트 스타일 */
        ul { list-style: none; }
        .list-item { 
            background: var(--bg); padding: 20px; display: flex; align-items: center; 
            border-radius: 20px; margin-bottom: 12px;
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.1), 0 2px 10px rgba(0,0,0,0.03);
        }
        .checkbox { width: 24px; height: 24px; border: 1.5px solid #d2d2d7; border-radius: 7px; margin-right: 16px; flex-shrink: 0; }
        .checkbox.checked { background: var(--text-main); border-color: var(--text-main); display: flex; align-items: center; justify-content: center; }
        .checkbox.checked::after { content: '✓'; color: white; font-size: 14px; }
        .item-text { font-size: 17px; font-weight: 500; flex: 1; color: var(--text-main); }
        .item-text.done { text-decoration: line-through; color: var(--text-sub); }

        /* 3. 하단 네비게이션: 고정(fixed)이 아닌 레이아웃의 일부로 배치 */
        .nav-bar { 
            background: #fff; border-top: 0.5px solid #eee;
            padding-bottom: var(--safe-bottom);
            display: flex; height: calc(64px + var(--safe-bottom));
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a1a1a6; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="gnb">
            <div class="gnb-content">
                <div class="gnb-title">ToDo</div>
                <div class="date-text">2026. 5. 4.</div>
            </div>
        </header>
        
        <main class="content">
            <div id="todoView">
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="새로운 할 일">
                    <button class="add-btn" onclick="addTodo()">+</button>
                </div>
                <ul id="activeList"></ul>
            </div>
            <div id="doneView" style="display:none; padding-top:20px;">
                <ul id="doneList"></ul>
            </div>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active" id="todoTab" onclick="goTab('todo')">
                <span class="nav-icon">◯</span><span>진행중</span>
            </div>
            <div class="nav-item" id="doneTab" onclick="goTab('done')">
                <span class="nav-icon">●</span><span>완료됨</span>
            </div>
        </nav>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('todo_vfinal')) || { a: [], d: [] };
        function save() { localStorage.setItem('todo_vfinal', JSON.stringify(db)); }

        function render() {
            const aList = document.getElementById('activeList');
            const dList = document.getElementById('doneList');
            aList.innerHTML = db.a.length === 0 ? `<div style="text-align:center; padding-top:100px; color:#ccc;">할 일이 없습니다.</div>` : "";
            dList.innerHTML = "";

            db.a.forEach((t, i) => {
                const li = document.createElement('li'); li.className = 'list-item';
                li.innerHTML = `<div class="checkbox" onclick="check(${i})"></div><span class="item-text">${t}</span>`;
                aList.appendChild(li);
            });
            db.d.forEach((t, i) => {
                const li = document.createElement('li'); li.className = 'list-item';
                li.innerHTML = `<div class="checkbox checked" onclick="uncheck(${i})"></div><span class="item-text done">${t}</span>`;
                dList.appendChild(li);
            });
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value.trim()) return;
            db.a.push(input.value); input.value = '';
            save(); render();
        }

        function check(i) { let item = db.a.splice(i, 1); db.d.push(item[0]); save(); render(); }
        function uncheck(i) { let item = db.d.splice(i, 1); db.a.push(item[0]); save(); render(); }

        function goTab(mode) {
            document.getElementById('todoView').style.display = mode === 'todo' ? 'block' : 'none';
            document.getElementById('doneView').style.display = mode === 'done' ? 'block' : 'none';
            document.getElementById('todoTab').classList.toggle('active', mode === 'todo');
            document.getElementById('doneTab').classList.toggle('active', mode === 'done');
        }

        render();
    </script>
</body>
</html>
