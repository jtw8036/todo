<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>할 일</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
    
    :root {
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --bg: #F2F2F7;
      --surface: #FFFFFF;
      --accent: #007AFF;
      --accent-light: rgba(0, 122, 255, 0.10);
      --danger: #FF3B30;
      --success: #34C759;
      --label: #1C1C1E;
      --label2: #3C3C43;
      --label3: #8E8E93;
      --separator: rgba(60, 60, 67, 0.12);
      --radius: 14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body { width: 100%; height: 100vh; overflow: hidden; font-family: 'Noto Sans KR', -apple-system, sans-serif; background: var(--bg); color: var(--label); -webkit-font-smoothing: antialiased; }
    #app { display: flex; flex-direction: column; width: 100%; height: 100vh; }

    /* ── Header ── */
    #header { flex-shrink: 0; background: rgba(242,242,247,0.85); backdrop-filter: saturate(180%) blur(20px); padding: calc(var(--safe-top) + 8px) 20px 0; z-index: 100; border-bottom: 0.5px solid var(--separator); }
    .header-title-row { display: flex; align-items: flex-end; justify-content: space-between; padding-bottom: 8px; min-height: 56px; }
    .large-title { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; }

    .progress-area { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .progress-text { font-size: 12px; font-weight: 500; color: var(--label3); }
    .progress-text span { color: var(--accent); font-weight: 600; }
    .progress-bar-wrap { width: 80px; height: 4px; background: var(--separator); border-radius: 99px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

    .date-header-wrapper { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; }
    #date-label-main { font-size: 17px; font-weight: 700; color: var(--label); }
    .today-pin-btn { background: var(--accent-light); border: none; border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--accent); padding: 5px 10px; cursor: pointer; }

    /* ── Weekly Strip (Fixed Visibility) ── */
    .weekly-strip-container { min-height: 70px; margin-bottom: 10px; position: relative; }
    #weekly-strip { display: flex; justify-content: space-between; padding: 0 2px; }
    .week-day { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 14%; cursor: pointer; position: relative; padding: 4px 0; }
    .week-day-name { font-size: 11px; font-weight: 500; color: var(--label3); }
    .week-day-num { font-size: 15px; font-weight: 600; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.1s; color: var(--label); }
    
    /* 선택된 날짜 숫자 안보임 해결 */
    .week-day.selected .week-day-num { background: var(--accent) !important; color: #FFFFFF !important; }
    .week-day.today .week-day-num { color: var(--accent); font-weight: 800; box-shadow: inset 0 0 0 1.5px var(--accent); }
    .has-todo-dot { position: absolute; bottom: 0; width: 4px; height: 4px; border-radius: 50%; }

    /* ── Input ── */
    #input-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: var(--radius); padding: 8px 8px 8px 14px; margin: 0 16px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    #todo-input { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; font-family: inherit; }
    #add-btn { width: 32px; height: 32px; border: none; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    /* ── Content ── */
    #content { flex: 1; overflow-y: auto; padding: 10px 16px 100px; -webkit-overflow-scrolling: touch; }
    .task-wrapper { position: relative; border-radius: var(--radius); overflow: hidden; margin-bottom: 8px; background: var(--danger); touch-action: pan-y; }
    .swipe-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 20px; color: #fff; font-size: 14px; font-weight: 600; }
    .task-card { position: relative; z-index: 1; background: var(--surface); display: flex; align-items: center; gap: 12px; padding: 14px 16px; transition: transform 0.2s ease-out; cursor: pointer; }
    .task-card.done .task-text-title { text-decoration: line-through; color: var(--label3); }
    .check-btn { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--separator); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .task-card.done .check-btn { background: var(--success); border-color: var(--success); }
    .task-text { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .task-text-title { font-size: 15px; font-weight: 500; color: var(--label); }
    .task-meta { font-size: 11px; color: var(--label3); margin-top: 2px; }

    /* ── Tab Bar ── */
    #tab-bar { position: fixed; bottom: 0; width: 100%; background: rgba(249,249,249,0.94); backdrop-filter: blur(20px); border-top: 0.5px solid var(--separator); display: flex; height: calc(60px + var(--safe-bottom)); padding-bottom: var(--safe-bottom); z-index: 1000; }
    .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; color: var(--label3); transition: 0.2s; }
    .tab-btn.active { color: var(--accent); }
    .tab-label { font-size: 10px; font-weight: 600; margin-top: 4px; }

    /* ── Modals ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: none; align-items: flex-end; opacity: 0; transition: opacity 0.2s; }
    .modal-overlay.show { display: flex; opacity: 1; }
    .detail-sheet { width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px calc(var(--safe-bottom) + 10px); transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .modal-overlay.show .detail-sheet { transform: translateY(0); }
    .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .detail-top-label { font-size: 15px; font-weight: 700; color: var(--label); }
    .detail-close { color: var(--accent); font-weight: 700; border: none; background: none; font-size: 15px; }
    #detail-task-display { font-size: 19px; font-weight: 700; margin-bottom: 20px; }
    .options-group { display: flex; gap: 8px; margin-bottom: 20px; }
    .opt-btn { flex: 1; padding: 12px; border-radius: 12px; background: var(--bg); border: none; font-weight: 600; font-size: 13px; }
    .opt-btn.active { background: var(--accent); color: #fff; }
    .subtask-add-btn { width: 100%; padding: 12px; border: 1px dashed var(--separator); border-radius: 12px; background: none; color: var(--accent); font-weight: 700; margin-top: 10px; }
    .detail-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .action-btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; }
    .btn-delete { background: #FFF5F5; color: var(--danger); }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-title-row">
      <span class="large-title">할 일</span>
      <div class="progress-area">
        <div class="progress-text"><span id="prog-done">0</span>/<span id="prog-total">0</span></div>
        <div class="progress-bar-wrap"><div id="prog-bar" class="progress-bar-fill"></div></div>
      </div>
    </div>
    <div class="date-header-wrapper">
      <span id="date-label-main"></span>
      <button class="today-pin-btn" onclick="goToToday()">오늘</button>
    </div>
    <div class="weekly-strip-container">
      <div id="weekly-strip"></div>
    </div>
    <div id="input-bar">
      <input id="todo-input" type="text" placeholder="할 일을 입력하세요" autocomplete="off" />
      <button id="add-btn" onclick="addTask()">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="#fff" fill="none" stroke-width="4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main id="content"></main>

  <nav id="tab-bar">
    <button class="tab-btn active" id="tab-active-btn" onclick="switchTab('active')">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      <span class="tab-label">진행 중</span>
    </button>
    <button class="tab-btn" id="tab-done-btn" onclick="switchTab('done')">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span class="tab-label">완료</span>
    </button>
  </nav>
</div>

<!-- 상세 모달 -->
<div id="detail-modal" class="modal-overlay" onclick="closeDetail()">
  <div class="detail-sheet" onclick="event.stopPropagation()">
    <div class="detail-header">
      <span class="detail-top-label">상세 설정</span>
      <button class="detail-close" onclick="closeDetail()">닫기</button>
    </div>
    <div id="detail-task-display"></div>
    <div class="options-group">
      <button class="opt-btn" onclick="handleRecurChange('none')" id="rec-none">안 함</button>
      <button class="opt-btn" onclick="handleRecurChange('daily')" id="rec-daily">매일</button>
      <button class="opt-btn" onclick="handleRecurChange('weekly')" id="rec-weekly">매주</button>
    </div>
    <div id="subtask-container"></div>
    <button class="subtask-add-btn" onclick="addSubtask()">+ 하위 항목 추가</button>
    <div class="detail-actions">
      <button class="action-btn" style="background:var(--bg);" onclick="closeDetail()">취소</button>
      <button class="action-btn btn-delete" onclick="handleDeleteFromDetail()">삭제</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
let currentDate = fmt(new Date());
let currentTab = 'active';
let editingId = null;

const getRawTodos = (date) => JSON.parse(localStorage.getItem('todos-' + date) || '[]');
const saveRawTodos = (date, list) => localStorage.setItem('todos-' + date, JSON.stringify(list));
const getRules = () => JSON.parse(localStorage.getItem('recurring-rules') || '[]');
const saveRules = (rules) => localStorage.setItem('recurring-rules', JSON.stringify(rules));

function loadMergedTodos(date) {
  const d = new Date(date + "T00:00:00");
  const rules = getRules();
  const instances = getRawTodos(date);
  const merged = rules.filter(r => {
    const start = new Date(r.startDate + "T00:00:00");
    if (d < start) return false;
    if (r.recurring === 'daily') return true;
    if (r.recurring === 'weekly') return d.getDay() === start.getDay();
    return false;
  }).map(r => {
    const inst = instances.find(i => i.ruleId === r.id);
    return { ...r, id: r.id, ruleId: r.id, done: inst ? inst.done : false, subTasks: inst ? inst.subTasks : (r.subTasks || []), isRecurring: true };
  });
  instances.filter(i => !i.ruleId).forEach(i => merged.push({ ...i, isRecurring: false }));
  return merged;
}

function render() {
  const all = loadMergedTodos(currentDate);
  const list = all.filter(t => currentTab === 'active' ? !t.done : t.done);
  $('prog-done').textContent = all.filter(t => t.done).length;
  $('prog-total').textContent = all.length;
  $('prog-bar').style.width = all.length ? (all.filter(t => t.done).length / all.length * 100) + '%' : '0%';
  
  const container = $('content');
  container.innerHTML = list.length ? '' : '<div style="text-align:center; padding-top:60px; color:#8e8e93; font-size:14px;">할 일이 없습니다.</div>';
  
  list.forEach(todo => {
    const wrap = document.createElement('div');
    wrap.className = 'task-wrapper';
    wrap.innerHTML = `
      <div class="swipe-bg" onclick="deleteTodo('${todo.id}', ${todo.isRecurring})">삭제</div>
      <div class="task-card ${todo.done ? 'done' : ''}" onclick="openDetail('${todo.id}', ${todo.isRecurring})">
        <div class="check-btn" onclick="event.stopPropagation(); toggleTodo('${todo.id}', ${todo.isRecurring})">${todo.done ? '✓' : ''}</div>
        <div class="task-text">
          <span class="task-text-title">${todo.text}</span>
          ${todo.recurring !== 'none' ? `<span class="task-meta">🔁 ${todo.recurring === 'daily' ? '매일' : '매주'}</span>` : ''}
        </div>
      </div>`;
    setupSwipe(wrap);
    container.appendChild(wrap);
  });
}

function addTask() {
  const input = $('todo-input'); if (!input.value.trim()) return;
  const todos = getRawTodos(currentDate);
  todos.push({ id: 't-' + Date.now(), text: input.value.trim(), done: false, subTasks: [], recurring: 'none' });
  saveRawTodos(currentDate, todos);
  input.value = ''; render(); updateWeeklyView();
}

function toggleTodo(id, isRec) {
  const todos = getRawTodos(currentDate);
  if (isRec) {
    let inst = todos.find(i => i.ruleId === id);
    if (!inst) {
      const rule = getRules().find(r => r.id === id);
      todos.push({ ruleId: id, done: true, subTasks: JSON.parse(JSON.stringify(rule.subTasks || [])) });
    } else inst.done = !inst.done;
  } else {
    let t = todos.find(i => i.id === id);
    if(t) t.done = !t.done;
  }
  saveRawTodos(currentDate, todos);
  render();
}

function updateWeeklyView() {
  const d = new Date(currentDate + "T00:00:00");
  $('date-label-main').textContent = `${d.getFullYear()}년 ${d.getMonth()+1}월`;
  const strip = $('weekly-strip');
  strip.innerHTML = '';
  
  let start = new Date(d);
  const day = d.getDay();
  start.setDate(d.getDate() - (day === 0 ? 6 : day - 1));

  for(let i=0; i<7; i++) {
    const curr = new Date(start);
    curr.setDate(start.getDate() + i);
    const s = fmt(curr);
    const isSelected = (s === currentDate);
    const isToday = (s === fmt(new Date()));
    
    const dayEl = document.createElement('div');
    dayEl.className = `week-day ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}`;
    
    const todos = loadMergedTodos(s);
    let dot = todos.length ? `<div class="has-todo-dot" style="background:${todos.some(t=>!t.done)?'var(--danger)':'var(--success)'}"></div>` : '';
    
    dayEl.innerHTML = `
      <span class="week-day-name">${['월','화','수','목','금','토','일'][i]}</span>
      <span class="week-day-num">${curr.getDate()}</span>
      ${dot}
    `;
    dayEl.onclick = () => { currentDate = s; updateWeeklyView(); render(); };
    strip.appendChild(dayEl);
  }
}

// 주 이동 스와이프 (성능 최적화)
let stripStartX = 0;
$('weekly-strip').ontouchstart = e => stripStartX = e.touches[0].clientX;
$('weekly-strip').ontouchend = e => {
  const diff = e.changedTouches[0].clientX - stripStartX;
  if (Math.abs(diff) > 50) {
    const d = new Date(currentDate + "T00:00:00");
    d.setDate(d.getDate() + (diff > 0 ? -7 : 7));
    currentDate = fmt(d);
    updateWeeklyView(); render();
  }
};

function setupSwipe(wrap) {
  const card = wrap.querySelector('.task-card');
  let startX = 0;
  card.ontouchstart = e => { startX = e.touches[0].clientX; card.style.transition = 'none'; };
  card.ontouchmove = e => {
    let x = e.touches[0].clientX - startX;
    if (x < 0) card.style.transform = `translateX(${Math.max(x, -80)}px)`;
  };
  card.ontouchend = e => {
    card.style.transition = 'transform 0.2s ease-out';
    let x = e.changedTouches[0].clientX - startX;
    card.style.transform = (x < -40) ? `translateX(-80px)` : `translateX(0)`;
  };
}

function openDetail(id, isRec) {
  editingId = id; const todo = loadMergedTodos(currentDate).find(t => t.id === id);
  $('detail-task-display').textContent = todo.text;
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  $(`rec-${todo.recurring || 'none'}`).classList.add('active');
  $('detail-modal').style.display = 'flex';
  setTimeout(() => $('detail-modal').classList.add('show'), 10);
}

function closeDetail() {
  $('detail-modal').classList.remove('show');
  setTimeout(() => $('detail-modal').style.display = 'none', 200);
}

function handleRecurChange(val) {
  const rules = getRules(); const todos = getRawTodos(currentDate);
  const todo = loadMergedTodos(currentDate).find(t => t.id === editingId);
  if (todo.isRecurring && val === 'none') {
    const idx = rules.findIndex(r => r.id === editingId); rules.splice(idx, 1);
    saveRules(rules);
  } else if (!todo.isRecurring && val !== 'none') {
    const idx = todos.findIndex(i => i.id === editingId); const item = todos.splice(idx, 1)[0];
    rules.push({ ...item, id: 'r-' + Date.now(), recurring: val, startDate: currentDate });
    saveRawTodos(currentDate, todos); saveRules(rules);
  } else if (todo.isRecurring) {
    const r = rules.find(r => r.id === editingId); if(r) r.recurring = val; saveRules(rules);
  }
  closeDetail(); render(); updateWeeklyView();
}

function deleteTodo(id, isRec) {
  if (isRec) saveRules(getRules().filter(r => r.id !== id));
  else saveRawTodos(currentDate, getRawTodos(currentDate).filter(t => t.id !== id));
  render(); updateWeeklyView();
}

function handleDeleteFromDetail() { deleteTodo(editingId, loadMergedTodos(currentDate).find(t => t.id === editingId).isRecurring); closeDetail(); }
function switchTab(t) { currentTab = t; $('tab-active-btn').classList.toggle('active', t==='active'); $('tab-done-btn').classList.toggle('active', t==='done'); render(); }
function goToToday() { currentDate = fmt(new Date()); updateWeeklyView(); render(); }
$('todo-input').onkeypress = e => { if(e.key === 'Enter') addTask(); };

updateWeeklyView();
render();
</script>
</body>
</html>
