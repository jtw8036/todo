<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ToDo">
    <style>
        :root { 
            --primary: #007aff; --bg: #ffffff; --surface: #f5f5f7;
            --text-main: #1d1d1f; --text-sub: #86868b;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* [해결 1] 전체 화면 강제 고정 및 하단바 붕 뜸 방지 */
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--bg); font-family: -apple-system, sans-serif; 
        }

        .app-container { 
            display: flex; flex-direction: column; 
            height: 100vh; height: -webkit-fill-available;
            position: relative;
        }

        /* GNB */
        .gnb { padding-top: var(--safe-top); background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); z-index: 100; }
        .gnb-content { padding: 30px 24px 10px; }
        .gnb-title { font-size: 34px; font-weight: 800; color: var(--text-main); letter-spacing: -1px; }
        .date-text { font-size: 17px; font-weight: 600; color: var(--text-sub); margin-top: 4px; }

        /* [해결 2] 리스트 영역 독립 스크롤 및 여백 최적화 */
        .content { 
            flex: 1; padding: 0 24px; overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding-bottom: 120px;
        }

        .input-group { 
            display: flex; background: var(--surface); padding: 8px 8px 8px 18px; 
            border-radius: 16px; margin: 20px 0 30px; 
        }
        input { flex: 1; border: none; background: none; height: 44px; font-size: 17px; outline: none; }
        .add-btn { width: 44px; height: 44px; background: var(--text-main); color: white; border: none; border-radius: 12px; font-size: 20px; }

        /* [해결 3] 카드 밀림 및 테두리 깨짐 원천 차단 */
        ul { list-style: none; }
        .list-item { 
            position: relative; background: var(--bg); padding: 20px; 
            display: flex; align-items: center; border-radius: 20px;
            margin-bottom: 12px; width: 100%;
            /* 테두리 깨짐 대신 깔끔한 그림자로 경계면 처리 */
            box-shadow: 0 0 0 0.5px rgba(0,0,0,0.1), 0 2px 10px rgba(0,0,0,0.03);
        }
        
        .checkbox { width: 24px; height: 24px; border: 1.5px solid #d2d2d7; border-radius: 7px; margin-right: 16px; flex-shrink: 0; }
        .item-text { font-size: 17px; font-weight: 500; color: var(--text-main); flex: 1; }
        .quick-delete { color: #d2d2d7; font-size: 18px; padding-left: 10px; }

        /* [해결 4] 하단 바 위치 물리적 고정 */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(64px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            display: flex; z-index: 200;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a1a1a6; font-size: 10px; font-weight: 600; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="gnb">
            <div class="gnb-content">
                <div class="gnb-title">ToDo</div>
                <div class="date-text" id="today">2026. 5. 4.</div>
            </div>
        </header>
        
        <main class="content">
            <div class="input-group">
                <input type="text" id="todoInput" placeholder="새로운 할 일">
                <button class="add-btn" onclick="add()">+</button>
            </div>
            <ul id="list"></ul>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active"><span class="nav-icon">◯</span><span>진행중</span></div>
            <div class="nav-item"><span class="nav-icon">●</span><span>완료됨</span></div>
        </nav>
    </div>

    <script>
        // 데이터 저장 및 렌더링 (가장 안전한 로직으로 교체)
        let todos = JSON.parse(localStorage.getItem('vibe_save')) || [];

        function render() {
            const ul = document.getElementById('list');
            ul.innerHTML = todos.length === 0 ? `<div style="text-align:center; padding-top:80px; color:#c7c7cc;">할 일이 없습니다.</div>` : "";
            todos.forEach((item, i) => {
                const li = document.createElement('li');
                li.className = 'list-item';
                li.innerHTML = `
                    <div class="checkbox"></div>
                    <span class="item-text">${item}</span>
                    <div class="quick-delete" onclick="del(${i})">✕</div>
                `;
                ul.appendChild(li);
            });
        }

        function add() {
            const input = document.getElementById('todoInput');
            if(!input.value.trim()) return;
            todos.push(input.value);
            localStorage.setItem('vibe_save', JSON.stringify(todos));
            input.value = '';
            render();
        }

        function del(i) {
            todos.splice(i, 1);
            localStorage.setItem('vibe_save', JSON.stringify(todos));
            render();
        }

        render();
    </script>
</body>
</html>
