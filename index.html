<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ToDo">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4697/4697260.png">

    <style>
        :root { 
            --primary: #007aff; --bg: #ffffff; --surface: #f5f5f7;
            --text-main: #1d1d1f; --text-sub: #86868b;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        .app-container { display: flex; flex-direction: column; height: 100%; }

        .gnb { padding-top: var(--safe-top); background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); z-index: 100; }
        .gnb-content { padding: 32px 24px 12px; }
        .gnb-title { font-size: 34px; font-weight: 700; color: var(--text-main); letter-spacing: -0.03em; margin-bottom: 6px; }
        .date-picker { font-size: 15px; font-weight: 500; color: var(--text-sub); border: none; outline: none; background: none; font-family: inherit; }

        .content { flex: 1; padding: 0 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .input-group { display: flex; background: var(--surface); padding: 8px 8px 8px 18px; border-radius: 16px; margin: 16px 0 32px; }
        input[type="text"] { flex: 1; border: none; background: none; height: 44px; font-size: 17px; outline: none; color: var(--text-main); }
        .add-btn { width: 44px; height: 44px; background: var(--text-main); color: white; border: none; border-radius: 12px; font-size: 22px; }

        ul { list-style: none; padding: 0; margin: 0; }
        .list-item { 
            background: var(--bg); padding: 20px; border-radius: 20px; margin-bottom: 12px; 
            display: flex; align-items: center; border: 1px solid #f2f2f2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .list-item.fade-out { opacity: 0; transform: scale(0.95); filter: blur(4px); }
        .checkbox { width: 24px; height: 24px; border: 1.5px solid #d2d2d7; border-radius: 7px; margin-right: 16px; flex-shrink: 0; }
        .checkbox.checked { background: var(--text-main); border-color: var(--text-main); display: flex; align-items: center; justify-content: center; }
        .checkbox.checked::after { content: '✓'; color: white; font-size: 14px; }

        .item-text { font-size: 17px; font-weight: 400; color: var(--text-main); line-height: 1.4; }
        .done-text { color: var(--text-sub); text-decoration: line-through; }

        .nav-bar { 
            height: calc(var(--safe-bottom) + 64px); display: flex; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px);
            border-top: 0.5px solid rgba(0,0,0,0.05); padding-bottom: var(--safe-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #a1a1a6; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="gnb">
            <div class="gnb-content">
                <div class="gnb-title">ToDo</div>
                <input type="date" id="dateSelect" class="date-picker" onchange="loadData()">
            </div>
        </header>
        
        <main class="content">
            <div id="todoTab">
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="새로운 할 일">
                    <button class="add-btn" onclick="addTodo()">+</button>
                </div>
                <ul id="activeList"></ul>
            </div>
            <div id="doneTab" style="display:none; padding-top: 20px;">
                <ul id="doneList"></ul>
            </div>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('todo', this)">
                <span class="nav-icon">◯</span><span>진행중</span>
            </div>
            <div class="nav-item" onclick="switchTab('done', this)">
                <span class="nav-icon">●</span><span>완료됨</span>
            </div>
        </nav>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e){})');
        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");

        const dInput = document.getElementById('dateSelect');
        dInput.value = new Date().toISOString().substring(0, 10);
        let db = JSON.parse(localStorage.getItem('vibe_todo_v5')) || {};

        function loadData() {
            const date = dInput.value;
            document.getElementById('activeList').innerHTML = "";
            document.getElementById('doneList').innerHTML = "";
            if (db[date]) {
                db[date].active.forEach(t => render(t, false));
                db[date].done.forEach(t => render(t, true));
            }
        }

        function render(text, isDone) {
            const li = document.createElement('li');
            li.className = 'list-item';
            li.innerHTML = isDone 
                ? `<div class="checkbox checked" onclick="undo(this)"></div><span class="item-text done-text">${text}</span>`
                : `<div class="checkbox" onclick="complete(this)"></div><span class="item-text">${text}</span>`;
            document.getElementById(isDone ? 'doneList' : 'activeList').appendChild(li);
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            if(!input.value.trim()) return;
            render(input.value, false);
            save();
            input.value = '';
        }

        function complete(el) {
            const li = el.parentElement;
            li.classList.add('fade-out');
            setTimeout(() => {
                li.remove();
                render(li.querySelector('.item-text').innerText.trim(), true);
                save();
            }, 400);
        }

        function undo(el) {
            const li = el.parentElement;
            li.classList.add('fade-out');
            setTimeout(() => {
                li.remove();
                render(li.querySelector('.item-text').innerText.trim(), false);
                save();
            }, 400);
        }

        function save() {
            const date = dInput.value;
            const active = Array.from(document.querySelectorAll('#activeList .item-text')).map(el => el.innerText);
            const done = Array.from(document.querySelectorAll('#doneList .item-text')).map(el => el.innerText);
            db[date] = { active, done };
            localStorage.setItem('vibe_todo_v5', JSON.stringify(db));
        }

        function switchTab(tab, el) {
            document.getElementById('todoTab').style.display = tab === 'todo' ? 'block' : 'none';
            document.getElementById('doneTab').style.display = tab === 'done' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        loadData();
    </script>
</body>
</html>
