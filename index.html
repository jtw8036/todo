<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ToDo">
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4697/4697260.png">

    <style>
        :root { 
            --primary: #007aff; 
            --bg: #ffffff;
            --surface: #f2f2f7;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); font-family: -apple-system, sans-serif; }

        .app-container { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

        .header { padding: 20px 24px; border-bottom: 0.5px solid #e5e5e7; }
        .title { font-size: 26px; font-weight: 800; color: var(--primary); margin: 0; }

        .content { flex: 1; padding: 24px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        /* 힌트 텍스트가 포함된 입력창 바이브 */
        .input-group { display: flex; background: var(--surface); padding: 10px 10px 10px 20px; border-radius: 20px; margin-bottom: 24px; }
        input { flex: 1; border: none; background: none; height: 44px; font-size: 17px; outline: none; color: #1c1c1e; }
        input::placeholder { color: #8e8e93; }
        .add-btn { width: 44px; height: 44px; background: var(--primary); color: white; border: none; border-radius: 14px; font-size: 24px; font-weight: 600; }

        .list-item { background: var(--surface); padding: 18px; border-radius: 18px; margin-bottom: 12px; font-weight: 500; display: flex; align-items: center; }

        /* 복구된 하단 메뉴 */
        .nav-bar { 
            height: calc(var(--safe-bottom) + 70px); 
            display: flex; border-top: 0.5px solid #d1d1d6; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            padding-bottom: var(--safe-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #8e8e93; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header"><h1 class="title">ToDo</h1></header>
        
        <main class="content">
            <div id="todoSection">
                <div class="input-group">
                    <input type="text" id="todoInput" placeholder="할 일을 입력하세요">
                    <button class="add-btn" onclick="add()">+</button>
                </div>
                <div id="list"></div>
            </div>
            <div id="doneSection" style="display:none; color:#8e8e93; text-align:center; padding-top:50px;">완료된 목록이 없습니다.</div>
        </main>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('todo', this)">
                <span class="nav-icon">📝</span><span>할 일</span>
            </div>
            <div class="nav-item" onclick="switchTab('done', this)">
                <span class="nav-icon">✅</span><span>완료함</span>
            </div>
        </nav>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e){})');
        }

        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");

        function add() {
            const input = document.getElementById('todoInput');
            if(!input.value.trim()) return;
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<span style="width:20px;height:20px;border:2px solid var(--primary);border-radius:50%;margin-right:12px;"></span>${input.value}`;
            document.getElementById('list').prepend(item);
            input.value = '';
        }

        function switchTab(tab, el) {
            document.getElementById('todoSection').style.display = tab === 'todo' ? 'block' : 'none';
            document.getElementById('doneSection').style.display = tab === 'done' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
