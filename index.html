<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS 전용 네이티브 앱 선언 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vibe Todo">
    
    <!-- 신분증 파일 연결 (이게 있어야 사파리 툴바가 사라집니다) -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4697/4697260.png">

    <style>
        :root { --primary: #007aff; --safe-top: env(safe-area-inset-top); }
        body, html { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: #fff; }
        .app-layout { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
        .header { padding: 20px 24px; border-bottom: 0.5px solid #e5e5e7; }
        .content { flex: 1; padding: 24px; }
        /* 툴바가 생기지 않도록 터치 제스처 제한 */
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
    </style>
</head>
<body>
    <div class="app-layout">
        <header class="header"><h1 style="color:var(--primary); margin:0; font-size:24px;">내 앱</h1></header>
        <main class="content"><p>이제 진짜 '내 앱'으로 작동합니다.</p></main>
    </div>

    <script>
        // iOS에서 클릭 시 사파리가 새 창으로 열리는 것을 방지하는 앱 잠금 스크립트
        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");
        
        // 서비스 워커 등록 (PWA 필수 요건)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e){})');
        }
    </script>
</body>
</html>
