<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ToDo">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4697/4697260.png">
    <style>
        :root { 
            --primary: #007aff; --bg: #ffffff; --surface: #f5f5f7;
            --text-main: #1d1d1f; --text-sub: #86868b; --danger: #ff3b30;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* [CTO 포인트] 전체 화면 높이를 기기 높이에 딱 맞게 고정 */
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; height: -webkit-fill-available;
            overflow: hidden; background: var(--bg); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        .app-container { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            position: relative;
        }

        .gnb { padding-top: var(--safe-top); background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); z-index: 100; }
        .gnb-content { padding: 32px 24px 12px; }
        .gnb-title { font-size: 34px; font-weight: 700; color: var(--text-main); letter-spacing: -0.03em; margin-bottom: 6px; }
        .date-picker { font-size: 15px; font-weight: 500; color: var(--text-sub); border: none; outline: none; background: none; font-family: inherit; }

        /* [CTO 포인트] 리스트 영역만 스크롤되도록 설정 */
        .content { 
            flex: 1; 
            padding: 0 24px; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 100px; /* 하단 바에 가려지지 않게 여백 확보 */
        }

        .input-group { display: flex; background: var(--surface); padding: 8px 8px 8px 18px; border-radius: 16px; margin: 16px 0 32px; }
        input[type="text"] { flex: 1; border: none; background: none; height: 44px; font-size: 17px; outline: none; color: var(--text-main); }
        .add-btn { width: 44px; height: 44px; background: var(--text-main); color: white; border: none; border-radius: 12px; font-size: 22px; }

        ul { list-style: none; padding: 0; margin: 0; }
        .item-wrapper { position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 12px; background-color: var(--danger); }
        .list-item { 
            position: relative; z-index: 2; background: var(--bg); padding: 20px; 
            display: flex; align-items: center; border-radius: 20px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.02); 
            transition: transform 0.2s ease-out; touch-action: pan-y;
        }
        
        .checkbox { width: 24px; height: 24px; border: 1.5px solid #d2d2d7; border-radius: 7px; margin-right: 16px; flex-shrink: 0; }
        .checkbox.checked { background: var(--text-main); border-color: var(--text-main); display: flex; align-items: center; justify-content: center; }
        .checkbox.checked::after { content: '✓'; color: white; font-size: 14px; }
        .item-text { font-size: 17px; font-weight: 400; color: var(--text-main); line-height: 1.4; pointer-events: none; flex: 1; }
        .done-text { color: var(--text-sub); text-decoration: line-through; }
        .quick-delete { color: #d2d2d7; font-size: 18px; padding-left: 10px; }

        /* [CTO 포인트] 네이비게이션 바를 화면 최하단에 절대 고정 */
        .nav-bar { 
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding-bottom: var(--safe-bottom);
            height: calc(var(--safe-bottom) + 64px); 
            display: flex; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: saturate(180%) blur(20px); 
            border-top: 0.5px solid rgba(0,0,0,0.08); 
            z-index: 200;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; color: #a1a1a6; }
        .nav-item.active { color: var(--text-main); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="gnb"><div class="gnb-content"><div class="gnb-title">ToDo</div><input type="date" id="dateSelect" class="date-picker" onchange="loadData()"></div></header>
        <main class="content">
            <div id="todoTab">
                <div class="input-group"><input type="text" id="todoInput" placeholder="새로운 할 일"><button class="add-btn" onclick="addTodo()">+</button></div>
                <ul id="activeList"></ul>
            </div>
            <div id="doneTab" style="display:none; padding-top: 20px;"><ul id="doneList"></ul></div>
        </main>
        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('todo', this)"><span class="nav-icon">◯</span><span>진행중</span></div>
            <div class="nav-item" onclick="switchTab('done', this)"><span class="nav-icon">●</span><span>완료됨</span></div>
        </nav>
    </div>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", function(e){})');
        (function(a,b,c){if(c in b&&b[c]){var d,e=a.location,f=/^(a|html)$/i;a.addEventListener("click",function(a){d=a.target;while(!f.test(d.nodeName))d=d.parentNode;"href"in d&&(d.href.indexOf("http")||~d.href.indexOf(e.host))&&(a.preventDefault(),e.href=d.href)},!1)}})(document,window.navigator,"standalone");

        const dInput = document.getElementById('dateSelect');
        let db = JSON.parse(localStorage.getItem('vibe_todo_v6')) || {};

        function initApp() {
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const today = new Date(now.getTime() - offset).toISOString().split('T')[0];
            dInput.value = today;
            loadData();
        }

        function loadData() {
            const activeUl = document.getElementById('activeList');
            const doneUl = document.getElementById('doneList');
            activeUl.innerHTML = ""; doneUl.innerHTML = "";
            const activeData = db[dInput.value]?.active || [];
            if (activeData.length === 0) {
                activeUl.innerHTML = `<div style="text-align:center; padding-top:100px; color:#c7c7cc;"><div style="font-size: 40px; margin-bottom: 12px;">📝</div><div style="font-size: 15px; font-weight: 500;">할 일이 없습니다.</div></div>`;
            } else { activeData.forEach(t => render(t, false)); }
            if (db[dInput.value]?.done) { db[dInput.value].done.forEach(t => render(t, true)); }
        }

        function render(text, isDone) {
            const wrapper = document.createElement('div');
            wrapper.className = 'item-wrapper';
            wrapper.innerHTML = `
                <div style="position:absolute; right:0; top:0; bottom:0; width:80px; display:flex; align-items:center; justify-content:center; color:white; font-weight:600; font-size:14px; z-index:1;">삭제</div>
                <div class="list-item" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd(event)">
                    <div class="checkbox ${isDone ? 'checked' : ''}" onclick="${isDone ? 'undo(this)' : 'complete(this)'}"></div>
                    <span class="item-text ${isDone ? 'done-text' : ''}">${text}</span>
                    <div class="quick-delete" onclick="remove(this)">✕</div>
                </div>
            `;
            document.getElementById(isDone ? 'doneList' : 'activeList').appendChild(wrapper);
        }

        let startX = 0; let currentItem = null;
        function handleTouchStart(e) { startX = e.touches[0].clientX; currentItem = e.currentTarget; currentItem.style.transition = 'none'; }
        function handleTouchMove(e) { const diff = e.touches[0].clientX - startX; if (diff < 0 && diff > -100) currentItem.style.transform = `translateX(${diff}px)`; }
        function handleTouchEnd(e) {
            const diff = e.changedTouches[0].clientX - startX;
            currentItem.style.transition = 'transform 0.2s ease-out';
            if (diff < -50) { currentItem.style.transform = 'translateX(-80px)'; currentItem.previousElementSibling.onclick = () => { currentItem.parentElement.remove(); save(); loadData(); }; }
            else { currentItem.style.transform = 'translateX(0)'; }
        }

        function addTodo() { const input = document.getElementById('todoInput'); if(!input.value.trim()) return; render(input.value, false); save(); input.value = ''; loadData(); }
        function complete(el) { const text = el.nextElementSibling.innerText; el.closest('.item-wrapper').remove(); render(text, true); save(); loadData(); }
        function undo(el) { const text = el.nextElementSibling.innerText; el.closest('.item-wrapper').remove(); render(text, false); save(); loadData(); }
        function remove(el) { el.closest('.item-wrapper').remove(); save(); loadData(); }

        function save() {
            const date = dInput.value;
            const active = Array.from(document.querySelectorAll('#activeList .item-text')).map(el => el.innerText);
            const done = Array.from(document.querySelectorAll('#doneList .item-text')).map(el => el.innerText);
            db[date] = { active, done };
            localStorage.setItem('vibe_todo_v6', JSON.stringify(db));
        }

        function switchTab(tab, el) {
            document.getElementById('todoTab').style.display = tab === 'todo' ? 'block' : 'none';
            document.getElementById('doneTab').style.display = tab === 'done' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        initApp();
    </script>
</body>
</html>
